{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration - Mentora</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/TeacherRegistration.css' %}">
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <div class="card registration-card p-4 p-md-5 bg-white">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Create Student Account</h3>
                        <p class="text-muted">Join our community of learners</p>
                    </div>
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    <form id="registrationForm" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder=""
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="name@gmail.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="studentId" class="form-label fw-semibold">Student ID Number</label>
                            <input type="text" class="form-control" id="studentId" name="studentId"
                                placeholder="e.g. 20240001">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" id="mainpassword" name="mainpassword" required>
                        </div>

                        <div class="mb-3">
                            <label for="password2" class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmpassword" name="confirmpassword"
                                required>
                        </div>
                        <div class="mb-4">
                            <label for="UploadPFP" class="form-label fw-semibold">Profile Image</label>
                            <input type="file" class="form-control" id="UploadPFP" name="UploadPFP">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-register text-white">REGISTER</button>
                        </div>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-muted">
                                Already have an account?
                               <a href="{% url 'signin_page_view' %}"
                                    class="text-primary text-decoration-none fw-bold">Log In</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/registration.js' %}"></script>
</body>

</html>

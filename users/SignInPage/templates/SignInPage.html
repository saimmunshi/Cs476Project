{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/SignInPage.css' %}">


</head>

<body>

    <div class="login-card ">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Sign In</h2>
            <p class="text-muted small">Enter your credentials to continue</p>
        </div>
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        <form method="POST" action="{% url 'signin_page_view' %}" novalidate>
            {% csrf_token %}
            <div class="mb-4">
                <input type="email" class="form-control" placeholder="Email" name="email" required>
            </div>

            <div class="mb-4">
                <div class="password-wrapper">
                    <input type="password" class="form-control" placeholder="Password" name="password" required>
                    <i class="fa-regular fa-eye"></i>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items: center mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">Sign In</button>

            <div class="text-center small text-muted">
                Don't have an account? <a href="{% url 'home' %}" class="create-link">Create one</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
